# ============================================
# Aklow Labs — Rate Limiting Zones + Bot Map
# ============================================
# Include in /etc/nginx/conf.d/aklow-security-zones.conf

# Rate limit zones
limit_req_zone $binary_remote_addr zone=aklow_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=aklow_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=aklow_chat:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=aklow_workspace_api:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=aklow_static:10m rate=50r/s;

# Bad bot detection map
map $http_user_agent $aklow_bad_bot {
    default 0;
    # Scrapers & spam bots
    ~*AhrefsBot 1;
    ~*SemrushBot 1;
    ~*MJ12bot 1;
    ~*DotBot 1;
    ~*BLEXBot 1;
    ~*SearchmetricsBot 1;
    ~*AspiegelBot 1;
    ~*PetalBot 1;
    ~*Bytespider 1;
    ~*DataForSeoBot 1;
    ~*Sogou 1;
    ~*Yandex 1;
    ~*MegaIndex 1;
    ~*Majestic 1;
    ~*BacklinkCrawler 1;
    ~*Exabot 1;
    ~*Lipperhey 1;
    ~*Screaming 1;
    ~*Netcraft 1;
    ~*ZoominfoBot 1;
    ~*Riddler 1;
    ~*Seekport 1;
    ~*SEOkicks 1;
    ~*serpstatbot 1;
    ~*Linguee 1;
    ~*CensysInspect 1;
    ~*Nimbostratus 1;
    ~*Mb2345Browser 1;
    ~*LieBaoFast 1;
    ~*MicroMessenger 1;
    ~*Kinza 1;
    # Generic bad patterns (curl, python-requests, Go-http-client allowed for API consumers)
    ~*libwww-perl 1;
}
