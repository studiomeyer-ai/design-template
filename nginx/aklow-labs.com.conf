# ============================================
# Aklow Labs - Website (aklow-labs.com)
# ============================================
# Rate-Limited, Bot-Protected, Security-Hardened
# ============================================

upstream aklow_website {
    server 127.0.0.1:2010;
    keepalive 64;
}

upstream aklow_workspace_api {
    server 127.0.0.1:2020;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name aklow-labs.com www.aklow-labs.com;
    return 301 https://aklow-labs.com$request_uri;
}

# www → non-www redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aklow-labs.com;

    ssl_certificate /etc/letsencrypt/live/aklow-labs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aklow-labs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://aklow-labs.com$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aklow-labs.com;

    ssl_certificate /etc/letsencrypt/live/aklow-labs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aklow-labs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security Snippets ────────────────────────────
    include /etc/nginx/snippets/aklow-security.conf;
    include /etc/nginx/snippets/aklow-security-headers.conf;

    # ─── Gzip ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # ─── Workspace API (AI Workspace on :2020) ────────
    # Developer API: /api/v1/* → proxied to AI Workspace
    # No bad-bot block (developers use curl, python-requests etc.)
    location /api/v1/ {
        limit_req zone=aklow_workspace_api burst=20 nodelay;
        limit_req_status 429;

        # Allow developer tools (override bad bot block for this location)
        # The security snippet blocks curl/python-requests globally,
        # but API consumers need these tools
        proxy_pass http://aklow_workspace_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for streaming chat responses
        proxy_read_timeout 300;
        proxy_buffering off;
        proxy_request_buffering off;

        # SSE support (chunked transfer)
        chunked_transfer_encoding on;
    }

    # ─── Stripe Webhook (no rate limit, needs raw body) ─
    location = /api/v1/billing/webhook {
        proxy_pass http://aklow_workspace_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Chat API — Stricter Rate Limit ───────────────
    location /api/chat {
        limit_req zone=aklow_chat burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://aklow_website;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # ─── API Routes — Rate Limited ────────────────────
    location /api/ {
        limit_req zone=aklow_api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://aklow_website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # ─── Static Assets — Long Cache ──────────────────
    location /_next/static {
        limit_req zone=aklow_static burst=20 nodelay;

        proxy_pass http://aklow_website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Image Optimization Cache ─────────────────────
    location /_next/image {
        proxy_pass http://aklow_website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ─── Main Proxy — General Rate Limit ──────────────
    location / {
        limit_req zone=aklow_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://aklow_website;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
