# ============================================
# Aklow Labs — Security Snippet
# ============================================
# Include in each server block: include /etc/nginx/snippets/aklow-security.conf;

# Block bad bots
if ($aklow_bad_bot) {
    return 403;
}

# Block source maps
location ~* \.map$ {
    return 404;
}

# Block sensitive files
location ~ /\.(env|git|sql|log|bak|DS_Store|svn|hg) {
    return 404;
}

# Block common scanner paths
location ~* (wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|\.php$) {
    return 404;
}

# Block hidden files (except .well-known)
location ~ /\.(?!well-known) {
    return 404;
}
